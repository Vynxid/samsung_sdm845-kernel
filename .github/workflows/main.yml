name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Setup Zyc Clang 20 and GCC 14.2.Rel1
      run: |
        # Download Zyc Clang 20
        mkdir -p clang
        curl -LSs "https://github.com/ZyCromerZ/Clang/releases/download/20/zyc_clang-20.tar.gz" | tar -xz -C clang

        # Download GCC 14.2.Rel1
        mkdir -p gcc
        curl -LSs "https://github.com/some-repo/gcc/releases/download/14.2.0-rel1/gcc-14.2-rel1.tar.gz" | tar -xz -C gcc

        # Export Clang and GCC to PATH
        export CLANG_PATH=$PWD/clang
        export GCC_PATH=$PWD/gcc
        export PATH="$CLANG_PATH/bin:$GCC_PATH/bin:$PATH"

    - name: Android kernel build with Zyc Clang 20 and GCC 14.2
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: clang
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb
        clang: ${{ env.CLANG_PATH }}
        gcc: ${{ env.GCC_PATH }}

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/dogi_memk.ko
          
