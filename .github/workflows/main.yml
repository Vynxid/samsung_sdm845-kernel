name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set Git safe directory
      run: git config --global --add safe.directory /github/workspace

    - name: Set up MemKernel as a module (M-OUT) with specified name
      run: |
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Install Zyc Clang 20 and GCC 14.2
      run: |
        mkdir -p toolchains && cd toolchains
        # Unduh dan ekstrak Zyc Clang 20
        curl -LO https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250123-release/Clang-20.0.0git-20250123.tar.gz
        # Periksa file yang telah diunduh
        ls -al
        # Ekstrak Zyc Clang 20
        tar -xvf Clang-20.0.0git-20250123.tar.gz
        # Periksa hasil ekstraksi
        ls -al
        # Unduh dan ekstrak GCC 14.2
        curl -LO https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
        tar -xvf arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
        # Periksa hasil ekstraksi GCC
        ls -al
        cd ..

    - name: Debug toolchain structure
      run: |
        echo "Mengecek struktur toolchain Clang:"
        ls -R ./toolchains/Clang-20.0.0git-20250123/
        echo "Mengecek struktur toolchain GCC:"
        ls -R ./toolchains/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu/

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: ./toolchains/Clang-20.0.0git-20250123/bin/clang  # Update dengan path yang benar jika diperlukan
        compiler_gcc: ./toolchains/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu/bin/aarch64-none-linux-gnu-gcc
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/dogi.memk.ko
