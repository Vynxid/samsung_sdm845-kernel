name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Install Clang 20 and GCC 14.2
      run: |
        # Update and install Clang and GCC from Ubuntu repos
        sudo apt-get update
        sudo apt-get install -y clang-14 gcc-14

        # Set Clang and GCC as the default
        export CC=clang-14
        export CXX=clang++-14
        export LD=ld.lld
        export PATH="/usr/bin/clang-14:/usr/bin/gcc-14:$PATH"

    - name: Android kernel build with Clang 20 and GCC 14.2
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: clang
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb
        clang: /usr/bin/clang-14
        gcc: /usr/bin/gcc-14

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/dogi.memk.ko
