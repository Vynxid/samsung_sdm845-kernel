name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module (M-OUT) with specified name
      run: |
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tar wget

    - name: Download and install Clang 20
      run: |
        wget https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250103-release/Clang-20.0.0git-20250103.tar.gz
        tar -xzf Clang-20.0.0git-20250103.tar.gz
        sudo mv Clang-20.0.0git-20250103 /usr/local/clang-20
        echo "/usr/local/clang-20/bin" >> $GITHUB_PATH

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
        CC: clang
        CXX: clang++
      with:
        arch: arm64
        compiler: clang
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/dogi.memk.ko
