name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Install ZyC Clang 20 and GCC 14.2.Rel1 Toolchain
      run: |
        # Install dependencies
        sudo apt update
        sudo apt install -y software-properties-common wget unzip

        # Install GCC 14.2.Rel1
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt update
        sudo apt install -y gcc-14 g++-14 gcc-14-aarch64-linux-gnu gcc-14-arm-linux-gnueabi

        # Download and setup ZyC Clang 20
        wget https://github.com/kdrag0n/proton-clang/releases/download/zyc-20/zyc-clang-20.zip
        unzip zyc-clang-20.zip -d /usr/local/zyc-clang
        export PATH="/usr/local/zyc-clang/bin:$PATH"
        clang --version  # Verify Clang installation

    - name: Set up MemKernel as a module (M-OUT) with specified name
      run: |
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: clang
        clang_path: /usr/local/zyc-clang
        gcc_version: 14.2
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko
