name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Setup Clang 20 and GCC 14.2.Rel1
      run: |
        # Download and extract Clang 20
        curl -L https://github.com/llvm/llvm-project/releases/download/llvmorg-20.0.0/clang+llvm-20.0.0-x86_64-linux-gnu.tar.xz -o clang.tar.xz
        tar -xf clang.tar.xz
        export CLANG_PATH=$PWD/clang+llvm-20.0.0-x86_64-linux-gnu
        export PATH="$CLANG_PATH/bin:$PATH"

        # Download and extract GCC 14.2.Rel1
        curl -L https://ftp.gnu.org/gnu/gcc/gcc-14.2.0/gcc-14.2.0.tar.xz -o gcc.tar.xz
        tar -xf gcc.tar.xz
        export GCC_PATH=$PWD/gcc-14.2.0
        export PATH="$GCC_PATH/bin:$PATH"

    - name: Android kernel build with Clang 20 and GCC 14.2
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: clang
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb
        clang: ${{ env.CLANG_PATH }}
        gcc: ${{ env.GCC_PATH }}

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/dogi_memk.ko
