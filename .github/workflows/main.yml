name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module (M-OUT) with specified name
      run: |
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M vinn

    - name: Download zyc clang 20 compiler
      uses: actions/download-artifact@v3
      with:
        name: compiler  # Assuming the artifact containing the compiler is named 'compiler'

    - name: Extract zyc clang 20 compiler
      run: |
        tar -xzf ${{ paths.downloaded }}  # Extract the downloaded artifact (assuming it's a tar archive)

    - name: Set up environment variable for zyc clang 20 compiler
      run: |
        echo "export PATH=$HOME/clang-20.0.0git-20250103/bin:$PATH" >> $GITHUB_ENV  # Set the path to the compiler's bin directory

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
        CC: clang  # Use clang as the compiler
        CXX: clang++  # Use clang++ as the C++ compiler (if applicable)
        # Rest of your existing environment variables (arch, defconfig, image)
      with:
        arch: arm64
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/vinn.memk.ko
