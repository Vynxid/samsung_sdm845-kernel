name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Download and set up Clang 20
      run: |
        # Membuat direktori untuk Clang dan mengunduh Clang 20
        mkdir -p clang
        curl -LSs "https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250103-release/Clang-20.0.0git-20250103.tar.gz" | tar -xz -C clang --strip-components=1
        
        # Menambahkan Clang ke PATH dan LD_LIBRARY_PATH
        echo "export PATH=$(pwd)/clang/bin:\$PATH" >> $GITHUB_ENV
        echo "export LD_LIBRARY_PATH=$(pwd)/clang/lib:\$LD_LIBRARY_PATH" >> $GITHUB_ENV
        source $GITHUB_ENV
        
        # Memverifikasi versi Clang
        clang --version

    - name: Build kernel using Clang 20
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: clang
        compiler_path: ${{ github.workspace }}/clang
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/*.ko
