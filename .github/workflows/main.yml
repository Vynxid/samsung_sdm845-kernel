name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Install Zyc Clang 20
      run: |
        # Download and extract Zyc Clang 20 from the provided URL
        curl -L https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250123-release/Clang-20.0.0git-20250123.tar.gz -o zyc_clang-20.tar.gz
        tar -xzvf zyc_clang-20.tar.gz

        # Set Zyc Clang 20 as the default compiler
        export CLANG_PATH=$PWD/Clang-20.0.0git-20250123
        export PATH="$CLANG_PATH/bin:$PATH"
        export CC=clang
        export CXX=clang++

        # Verify Clang 20 installation
        clang --version

    - name: Set up MemKernel as a module (M-OUT) with specified name
      run: |
        curl -LSs "https://raw.githubusercontent.com/aiichi/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Android kernel build with Zyc Clang 20
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Starqltechn
      with:
        arch: arm64
        compiler: clang
        defconfig: starqlte_chn_open_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/dogi.memk.ko
