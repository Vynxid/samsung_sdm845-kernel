name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. Checkout kernel source
    - name: Checkout kernel source
      uses: actions/checkout@v4

    # 2. Set up MemKernel as a module (M-OUT) with specified name
    - name: Set up MemKernel as a module
      run: |
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M Starqltechn

    # 3. Android kernel build
    - name: Android kernel build
      run: |
        # Setup environment
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export PATH="/usr/lib/llvm-11/bin:$PATH"

        # Build kernel
        make starqlte_chn_open_defconfig
        make -j$(nproc) > build.log 2>&1 || true

    # 4. Upload Kernel, Module, and Logs
    - name: Upload Kernel, Module, and Logs
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build-artifacts
        path: |
          ./build.log
          ./out/arch/arm64/boot/Image.gz-dtb
          ./out/drivers/memkernel/memkernel.ko
